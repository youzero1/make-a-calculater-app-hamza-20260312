version: '3.8'

services:
  calculator-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: calculator-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/database.sqlite
    volumes:
      - calculator-db:/app/data
    restart: unless-stopped

volumes:
  calculator-db:
    driver: local
